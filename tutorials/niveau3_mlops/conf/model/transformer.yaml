# tutorials/niveau3_mlops/conf/model/transformer.yaml
# ======================================================
# Configuration Transformer — switch PyTorch / TensorFlow

name: transformer
framework: torch        # ← changer en "tf" pour TensorFlow, "torch" pour PyTorch
d_model: 64
num_heads: 4
num_layers: 2
dim_feedforward: 128
dropout: 0.1
n_classes: 2
seq_len: 5             # longueur de séquence (tokens ou embeddings)
pooling: mean          # "mean" | "cls" | "max"
